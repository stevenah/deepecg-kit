site_name: DeepECG-Kit
site_url: https://stevenah.github.io/deepecg-kit/
site_description: A deep learning library for ECG analysis and arrhythmia classification
repo_url: https://github.com/stevenah/deepecg-kit
repo_name: stevenah/deepecg-kit
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - CLI Usage: user-guide/cli.md
      - Training: user-guide/training.md
      - Datasets: user-guide/datasets.md
      - Model Zoo: user-guide/model-zoo.md
      - Evaluation: user-guide/evaluation.md
  - Examples:
      - Basic Training: examples/train-basic.md
      - Advanced Training: examples/train-advanced.md
      - Model Comparison: examples/model-comparison.md
  - API Reference:
      - deepecgkit: api/index.md
      - datasets: api/datasets.md
      - models: api/models.md
      - training: api/training.md
      - evaluation: api/evaluation.md
      - registry: api/registry.md
      - utils: api/utils.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stevenah/deepecg-kit

watch:
  - deepecgkit
