defaults:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  val_split: 0.2
  test_split: 0.1
  num_workers: 4
  accelerator: auto
  devices: 1
  early_stopping_patience: 10
  seed: 42

experiments:
  # ──────────────────────────────────────────────
  # Dataset: ptbxl (12-lead, 5 superclasses)
  # Baseline architecture comparison (Table III)
  # ──────────────────────────────────────────────

  - model: crnn
    dataset: ptbxl
    multi_label: true

  - model: convnext-v2
    dataset: ptbxl
    multi_label: true

  - model: dualnet
    dataset: ptbxl
    multi_label: true

  - model: medformer
    dataset: ptbxl
    multi_label: true
    learning_rate: 0.0005

  - model: mamba
    dataset: ptbxl
    multi_label: true
    learning_rate: 0.0005
    
  - model: simple-cnn
    dataset: ptbxl
    multi_label: true

  - model: resnet
    dataset: ptbxl
    multi_label: true

  - model: se-resnet
    dataset: ptbxl
    multi_label: true

  - model: xresnet
    dataset: ptbxl
    multi_label: true

  - model: inception-time
    dataset: ptbxl
    multi_label: true

  - model: tcn
    dataset: ptbxl
    multi_label: true

  - model: kanres
    dataset: ptbxl
    multi_label: true

  - model: lstm
    dataset: ptbxl
    multi_label: true

  - model: transformer
    dataset: ptbxl
    multi_label: true

  - model: deep-res-cnn
    dataset: ptbxl
    sampling_rate: 100
    learning_rate: 0.0005
    epochs: 100
    early_stopping_patience: 6
    val_split: 0.12
    multi_label: true
    normalization: none

  # ──────────────────────────────────────────────
  # Dataset: af-classification (1-lead, 4 classes)
  # PhysioNet 2017 AF Challenge
  # ──────────────────────────────────────────────
  - model: crnn
    dataset: af-classification

  - model: convnext-v2
    dataset: af-classification

  - model: dualnet
    dataset: af-classification

  - model: medformer
    dataset: af-classification
    learning_rate: 0.0005

  - model: mamba
    dataset: af-classification
    learning_rate: 0.0005

  - model: simple-cnn
    dataset: af-classification

  - model: resnet
    dataset: af-classification

  - model: se-resnet
    dataset: af-classification

  - model: xresnet
    dataset: af-classification

  - model: inception-time
    dataset: af-classification

  - model: tcn
    dataset: af-classification

  - model: kanres
    dataset: af-classification

  - model: lstm
    dataset: af-classification

  - model: transformer
    dataset: af-classification

  # ──────────────────────────────────────────────
  # Dataset: mitbih-afdb (2-lead, 4 classes)
  # MIT-BIH Atrial Fibrillation Database
  # ──────────────────────────────────────────────
  - model: crnn
    dataset: mitbih-afdb

  - model: convnext-v2
    dataset: mitbih-afdb

  - model: dualnet
    dataset: mitbih-afdb

  - model: medformer
    dataset: mitbih-afdb
    learning_rate: 0.0005

  - model: mamba
    dataset: mitbih-afdb
